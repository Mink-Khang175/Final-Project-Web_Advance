<div class="product-card" [class.is-sold-out]="product.soldOut" (click)="navigateToDetail()">

  <span class="badge badge--sale" *ngIf="hasDiscount && !product.soldOut">SALE</span>
  <span class="badge badge--soldout" *ngIf="product.soldOut">SOLD OUT</span>

  <div class="card-image">
    <img [src]="product.image" [alt]="product.name" loading="lazy">
    <img *ngIf="product.imageHover"
         [src]="product.imageHover"
         [alt]="product.name"
         class="img-hover"
         loading="lazy">
  </div>

  <div class="card-info">
    <div class="card-name">{{ product.name }}</div>
    <div class="card-price">
      <span class="price-sale" *ngIf="hasDiscount">${{ displayPrice.toFixed(2) }}</span>
      <span class="price-original" *ngIf="hasDiscount">${{ product.price.toFixed(2) }}</span>
      <span *ngIf="!hasDiscount">${{ product.price.toFixed(2) }}</span>
    </div>
  </div>

  <div class="card-actions" *ngIf="!product.soldOut">
    <button class="btn-buy" (click)="onBuyNow($event)">BUY NOW</button>
    <button class="btn-cart" (click)="onAddToCart($event)">ADD TO CART</button>
  </div>

</div>
