<!-- Membership Card with Flip Effect -->
<div class="card-perspective" (click)="toggleFlip()">
  <div class="card-inner" [style.transform]="'rotateY(' + (flipCount * 180) + 'deg)'">
    
    <!-- FRONT FACE -->
    <div class="card-face card-front">
      <div class="logo-container">
        <div class="brand-title">AVANT ATELIER</div>
        <div class="brand-subtitle">Est. 2025</div>
      </div>
      <div class="click-hint">Tap to Flip</div>
    </div>

    <!-- BACK FACE -->
    <div class="card-face card-back">
      <div class="bg-watermark">AVANT</div>

      <div class="header-section">
        <div class="card-title">Membership Card</div>
        <div class="card-id-small">NO. {{ cardNumber }}</div>
      </div>

      <div class="content-grid">
        <div class="avatar-column" (click)="$event.stopPropagation()">
          <div class="avatar-container">
            <img [src]="displayPhoto"
                 [alt]="userName"
                 class="profile-avatar">
            <button class="avatar-upload-btn"
                    (click)="triggerAvatarUpload()"
                    title="Change photo">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                   stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="12" y1="5" x2="12" y2="19"/>
                <line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
            </button>
            <input #avatarInput type="file" accept="image/*"
                   (change)="onAvatarFileSelected($event)"
                   style="display:none">
          </div>
        </div>
        
        <div class="info-column">
        <div class="left-col">
          <div class="info-group">
            <div class="label">Name</div>
            <div class="value">{{ userName }}</div>
          </div>
          <div class="info-group">
            <div class="label">Member Since</div>
            <div class="value">{{ memberSince }}</div>
          </div>
        </div>

        <div class="right-col">
          <div class="info-group">
            <div class="label">Email</div>
            <div class="value email-value">{{ userEmail }}</div>
          </div>
          <div class="info-group">
            <div class="label">Status</div>
            <div class="status-box">{{ memberStatus }}</div>
          </div>
        </div>
        </div>
      </div>

      <div class="footer-section">
        <div class="barcode-strip"></div>
        <div class="barcode-number">{{ barcodeNumber }}</div>
      </div>
    </div>

  </div>
</div>
